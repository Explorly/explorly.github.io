<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explorly</title>
    <meta name="description" content="Explorly helps you discover and organize your next adventures." />
    <link rel="icon" type="image/png" href="/appIcon.png" />
    <link rel="apple-touch-icon" href="/appIcon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <div class="container nav">
        <div class="brand">Explorly</div>
        <nav class="nav-links" aria-label="Main">
          <a class="nav-link active" href="/">Home</a>
          <a class="nav-link" href="/privacy-policy/">Privacy Policy</a>
          <a class="nav-link" href="/terms-of-service/">Terms of Service</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <section class="hero hero-home" aria-labelledby="home-heading">
          <h1 id="home-heading">Plan better adventures with Explorly</h1>
          <p class="muted">
            Explorly is your companion for saving places, organizing ideas, and planning future trips in one simple flow.
          </p>
          <h2 class="store-title">Get the app</h2>
          <div class="store-buttons">
            <a
              class="store-link"
              href="https://apps.apple.com/app/id6762136620"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Download Explorly on the App Store"
            >
              <img
                src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg"
                alt="Download on the App Store"
                class="store-badge"
              />
            </a>
          </div>
        </section>
      </div>
    </main>

    <footer>
      <div class="container">&copy; 2026 Explorly. All rights reserved.</div>
    </footer>
  </body>
</html>
